name: regenerate-console
on:
  schedule:
    - cron: '29 18 * * *'
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.0
        with: { cli: latest }
      - name: regenerate through the real actor
        run: clojure -M:render-html
      - name: verify (real output, not scaffolding)
        run: |
          grep -q 'transport.render-html' docs/samples/operator-console.html
          grep -q '<tbody>' docs/samples/operator-console.html
          test "$(wc -l < docs/samples/operator-console.html)" -gt 30
          echo "operator console sanity ok"
      - name: commit when changed
        run: |
          if ! git diff --quiet docs/; then
            git config user.name "regenerate-console[bot]"
            git config user.email "noreply@github.com"
            git add docs/
            git commit -m "chore(console): nightly regeneration through the real actor"
            git push
          else
            echo "console unchanged"
          fi
